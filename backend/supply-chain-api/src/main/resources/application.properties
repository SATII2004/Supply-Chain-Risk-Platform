spring.application.name=supply-chain-api

spring.datasource.url=jdbc:mysql://localhost:3306/supply_chain_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# MongoDB Connection for Real-Time ML Alerts
# Explicit MongoDB Configuration
spring.data.mongodb.uri=mongodb://127.0.0.1:27027/supply_chain_db